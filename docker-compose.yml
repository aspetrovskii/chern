name: conce-music

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/sqlite.db
      LLM_CACHE_DB_PATH: /app/data/llm_cache.db
    volumes:
      - conce_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  conce_data:
