name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  backend-lint-unit-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint backend
        run: python -m ruff check src tests scripts

      - name: Unit tests backend
        run: python -m pytest

      - name: Integration smoke backend
        env:
          PYTHONPATH: src
        run: |
          python scripts/smoke_llm_pipeline.py
          python -m alembic upgrade head
          python scripts/smoke_api.py

  frontend-lint-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Frontend smoke build
        run: npm run smoke
